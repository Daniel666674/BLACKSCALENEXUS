services:
  crm:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist database outside container
      - ./data:/app/data
      # Persist user config
      - ./crm-config.json:/app/crm-config.json
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
